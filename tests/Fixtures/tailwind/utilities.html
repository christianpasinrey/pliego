<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Tailwind utilities fixture</title></head>
<body class="bg-white text-slate-900">
  <div class="p-4 m-2 gap-4">
    <div class="p-1 p-2 p-3 p-4 p-6 p-8 px-4 py-2 pt-1 pr-2 pb-3 pl-4"></div>
    <div class="m-1 m-2 m-3 m-4 m-6 m-8 mx-auto my-4 mt-1 mr-2 mb-3 ml-4"></div>
    <div class="gap-1 gap-2 gap-4 gap-6 gap-x-2 gap-y-4"></div>
  </div>

  <div class="flex flex-row flex-col flex-wrap flex-nowrap justify-start justify-center justify-between justify-end items-start items-center items-end items-stretch">
    <div class="flex-1 flex-none"></div>
  </div>

  <div class="grid grid-cols-3 grid-rows-2 col-span-2 row-span-1 gap-3"></div>

  <div class="bg-blue-500 bg-blue-600 bg-red-600 bg-slate-50 bg-slate-100 bg-slate-200 bg-slate-500 bg-slate-900 bg-green-500 bg-amber-400 bg-emerald-600 bg-indigo-500 bg-white bg-black bg-transparent">
    <span class="text-blue-500 text-slate-700 text-red-600 text-green-600 text-white text-black"></span>
  </div>

  <div class="text-xs text-sm text-base text-lg text-xl text-2xl text-3xl font-thin font-normal font-medium font-semibold font-bold font-black tracking-tight tracking-normal tracking-wide leading-none leading-tight leading-normal leading-relaxed"></div>

  <div class="rounded rounded-sm rounded-md rounded-lg rounded-xl rounded-full rounded-t-lg rounded-b-md border border-2 border-4 border-slate-300 border-blue-500 border-t border-b-2 border-dashed border-solid"></div>

  <div class="shadow shadow-sm shadow-md shadow-lg shadow-xl shadow-2xl shadow-inner"></div>

  <div class="w-4 w-8 w-16 w-32 w-1/2 w-full w-screen h-4 h-8 h-16 h-32 h-1/2 h-full h-screen min-w-0 max-w-md min-h-screen"></div>

  <table class="w-full border-collapse">
    <thead>
      <tr class="bg-slate-100">
        <th class="p-2 text-left border border-slate-300">Header</th>
      </tr>
    </thead>
    <tbody>
      <tr class="odd:bg-white even:bg-slate-50">
        <td class="p-2 border border-slate-300">Cell</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
