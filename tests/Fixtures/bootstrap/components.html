<body>
  <h1 class="display-4">Component Showcase</h1>

  <p>
    <button type="button" class="btn btn-primary">Primary</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-outline-primary">Outline</button>
  </p>

  <div class="card">
    <div class="card-body">
      <h5 class="card-title">Card title</h5>
      <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
      <a href="#" class="btn btn-primary">Go somewhere</a>
    </div>
  </div>

  <table class="table table-striped table-striped-compat">
    <thead>
      <tr><th>#</th><th>Name</th><th>Role</th></tr>
    </thead>
    <tbody>
      <tr><td>1</td><td>Ana</td><td>Engineer</td></tr>
      <tr><td>2</td><td>Luis</td><td>Designer</td></tr>
      <tr><td>3</td><td>Marta</td><td>Manager</td></tr>
      <tr><td>4</td><td>Iker</td><td>Support</td></tr>
    </tbody>
  </table>

  <p>
    <span class="badge bg-primary">New</span>
    <span class="badge bg-secondary">Draft</span>
    <span class="badge rounded-pill bg-success">Active</span>
  </p>

  <div class="alert alert-primary" role="alert">A simple primary alert.</div>
  <div class="alert alert-success" role="alert">A simple success alert.</div>
</body>
