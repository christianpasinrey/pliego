name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring
          coverage: none
      - run: composer install --no-interaction --no-progress
      - run: composer style
      - run: composer analyse
      - run: composer arch
      - run: composer test
