deptrac:
  paths: [src]
  layers:
    - { name: Css,    collectors: [{ type: directory, value: src/Css }] }
    - { name: Style,  collectors: [{ type: directory, value: src/Style }] }
    - { name: Dom,    collectors: [{ type: directory, value: src/Dom }] }
    - { name: Box,    collectors: [{ type: directory, value: src/Box }] }
    - { name: Layout, collectors: [{ type: directory, value: src/Layout }] }
    - { name: Text,   collectors: [{ type: directory, value: src/Text }] }
    - { name: Page,   collectors: [{ type: directory, value: src/Page }] }
    - { name: Paint,  collectors: [{ type: directory, value: src/Paint }] }
    - { name: Pdf,    collectors: [{ type: directory, value: src/Pdf }] }
    - { name: Engine, collectors: [{ type: classLike, value: 'Pliego\\(Engine|RenderResult|RenderReport)' }] }
    - { name: Vendor, collectors: [{ type: classLike, value: '^(Sabberworm\\CSS\\.*|Dom\\.*)$' }] }
  ruleset:
    Css: [Vendor]
    Style: [Css, Vendor]
    Dom: [Vendor]
    Box: [Dom, Style, Css, Vendor]
    Layout: [Box, Style, Css, Text]
    Text: []
    Page: [Layout, Css]
    Paint: [Layout, Page, Css, Text]
    Pdf: [Paint, Text, Css, Layout, Page]
    Engine: [Css, Style, Dom, Box, Layout, Text, Page, Paint, Pdf]
